name: PR Checks

on:
  pull_request:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install uv
        run: python -m pip install --upgrade pip uv
      - name: Install dependencies
        run: uv sync --group dev
      - name: Run pre-commit
        run: uv run pre-commit run --all-files
  tests-core:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install uv
        run: python -m pip install --upgrade pip uv
      - name: Install dependencies
        run: uv sync --group dev --extra cloud
      - name: Run core tests
        run: |
          uv run pytest -q \
            tests/test_cli_main.py \
            tests/test_cli_evaluate.py \
            tests/test_cli_support.py \
            tests/test_evaluation_utils.py \
            tests/test_gpt_judge_async.py \
            tests/test_prompt_templates.py
  tests-integration:
    runs-on: ubuntu-latest
    needs: tests-core
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install uv
        run: python -m pip install --upgrade pip uv
      - name: Install dependencies
        run: uv sync --group dev
      - name: Run offline backend contract regressions
        run: uv run pytest -q tests/test_backend_contracts.py
  smoke-cloud:
    runs-on: ubuntu-latest
    needs: tests-integration
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install uv
        run: python -m pip install --upgrade pip uv
      - name: Install dependencies
        run: uv sync --group dev --extra cloud
      - name: Smoke import cloud backends
        run: |
          uv run python - <<'PY'
          import umbrela.gpt_judge
          import umbrela.gemini_judge
          print("cloud backends importable")
          PY
  smoke-hf:
    runs-on: ubuntu-latest
    needs: tests-integration
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install uv
        run: python -m pip install --upgrade pip uv
      - name: Install dependencies
        run: uv sync --group dev --extra hf
      - name: Smoke import HF backend
        run: |
          uv run python - <<'PY'
          import umbrela.hgfllm_judge
          print("hf backend importable")
          PY
  smoke-pyserini:
    runs-on: ubuntu-latest
    needs: tests-integration
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install uv
        run: python -m pip install --upgrade pip uv
      - name: Install dependencies
        run: uv sync --group dev --extra pyserini
      - name: Smoke import pyserini-backed utilities
        run: |
          uv run python - <<'PY'
          import umbrela.utils.qrel_utils
          print("pyserini utilities importable")
          PY
