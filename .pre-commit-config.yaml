default_install_hook_types: [pre-commit, pre-push]

repos:
  - repo: local
    hooks:
      - id: umbrela-quality-gate-pre-commit
        name: umbrela quality gate (pre-commit)
        entry: bash scripts/quality_gate.sh push
        language: system
        pass_filenames: false
        stages: [pre-commit]
      - id: umbrela-quality-gate-pre-push
        name: umbrela quality gate (pre-push)
        entry: bash scripts/quality_gate.sh push
        language: system
        pass_filenames: false
        stages: [pre-push]
